<!DOCTYPE html>
<html lang="vi">

<head>
  <script>
    (function () {
      window.process = { env: {}, argv: [], cwd: () => "/" };
      class BrowserBuffer extends Uint8Array {
        static isBuffer(b) { return b instanceof BrowserBuffer; }
        static from(data) {
          if (typeof data === 'string') {
            return new BrowserBuffer(new TextEncoder().encode(data));
          }
          return new BrowserBuffer(data);
        }
        static alloc(size) { return new BrowserBuffer(size); }
        static allocUnsafe(size) { return new BrowserBuffer(size); }
        static byteLength(string) {
          return new TextEncoder().encode(string).length;
        }
        static concat(list, totalLength) {
          if (!Array.isArray(list)) throw new TypeError("list must be an Array");
          if (totalLength === undefined) {
            totalLength = list.reduce((acc, val) => acc + val.length, 0);
          }
          const result = new BrowserBuffer(totalLength);
          let offset = 0;
          for (const buf of list) {
            result.set(buf, offset);
            offset += buf.length;
          }
          return result;
        }
        toString() { return new TextDecoder().decode(this); }
        write(string, offset = 0) {
          const bytes = new TextEncoder().encode(string);
          const len = Math.min(bytes.length, this.length - offset);
          for (let i = 0; i < len; i++) {
            this[offset + i] = bytes[i];
          }
          return len;
        }
        writeUInt32BE(value, offset = 0) {
          this[offset] = (value >>> 24) & 0xff;
          this[offset + 1] = (value >>> 16) & 0xff;
          this[offset + 2] = (value >>> 8) & 0xff;
          this[offset + 3] = value & 0xff;
          return offset + 4;
        }
        readUInt32BE(offset = 0) {
          return (this[offset] << 24) | (this[offset + 1] << 16) | (this[offset + 2] << 8) | this[offset + 3];
        }
      }
      window.Buffer = BrowserBuffer;
      window.addEventListener('error', function (e) {
        var err = e.error || e;
        localStorage.setItem('last_error', err.message + '\n' + (err.stack || '') + '\n' + e.filename + ':' + e.lineno + ':' + e.colno);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var err = e.reason || e;
        localStorage.setItem('last_error', 'Unhandled Rejection: ' + err.message + '\n' + (err.stack || ''));
      });
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"

  <link id="favicon" rel="icon" type="image/avif" href="/images/RottraAI_avatar.avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" media="print"
    onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </noscript>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <title>Rottra</title>
  <script>
    (function () {
      // Chống lóa trắng (FOUC)
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.add('light');
      }

      const cachedName = localStorage.getItem("rottra_web_name");
      if (cachedName) document.title = cachedName;

      const cachedAvatar = localStorage.getItem("rottra_agent_avatar");
      if (cachedAvatar) {
        const faviconLink = document.getElementById("favicon");
        if (faviconLink) {
          faviconLink.href = cachedAvatar;
          if (cachedAvatar.endsWith(".svg")) {
            faviconLink.type = "image/svg+xml";
          } else if (cachedAvatar.endsWith(".png")) {
            faviconLink.type = "image/png";
          } else {
            faviconLink.type = "image/jpeg";
          }
        }
      }
    })();
  </script>
  <style>
    /* CSS tốc hành chống lóa trắng khi chưa kịp load file CSS chính */
    html.dark,
    html.dark body {
      background-color: #202020 !important;
      color: #cccccc !important;
    }
  </style>
</head>
